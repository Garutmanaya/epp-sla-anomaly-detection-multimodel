name: Build & Push Docker Image to ECR

on:
  push:
    tags:
      - "v*"   # triggers on version tags like v1.0.0
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      # This runs the steps below twice: once for 'app' and once for 'ui'
      matrix:
        component: [app]

    env:
      NAMESPACE: epp-sla-hourly-anomaly
      IMAGE_TAG: latest
      # Dynamically build the full path: e.g., epp-sla-hourly-anomaly/app(ui)
      REPO_FULL_NAME: epp-sla-hourly-anomaly/${{ matrix.component }}


    steps:
      # -------------------------
      # 1️⃣ Checkout Code
      # -------------------------
      - name: Checkout repository
        uses: actions/checkout@v3

      # -------------------------
      # 2️⃣ Configure AWS Credentials
      # -------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # -------------------------
      # 3️⃣ Login to Amazon ECR
      # -------------------------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
        with:
          mask-password: true

      # -------------------------
      # 4️⃣ Extract Git Tag 
      # -------------------------
      - name: Extract Git Tag
        id: vars
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      # --------------------------------------------
      # 5️⃣ Build, Tag and Push Docker Image
      # ---------------------------------------------
      - name: Build, Tag and Push Docker image 
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO_NAME: ${{ env.NAMESPACE }}/${{ matrix.component }}
          IMAGE_TAG: latest
        run: |
       
          echo "Building $REPO_NAME using docker/${{ matrix.component }}.Dockerfile"
          
          # -f points to the specific Dockerfile
          # The "." at the end sets the root of the repo as the context 
          # so your Dockerfile can find your 2MB models and source code.
          docker build \
            -t $ECR_REGISTRY/$REPO_NAME:${{ steps.vars.outputs.tag }} \
            -t $ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG \
            -f docker/${{ matrix.component }}.Dockerfile .
          
          docker push $ECR_REGISTRY/$REPO_NAME:${{ steps.vars.outputs.tag }}
          docker push $ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG" >> $GITHUB_OUTPUT 
          echo "image=$ECR_REGISTRY/$REPO_NAME:${{ steps.vars.outputs.tag }}" >> $GITHUB_OUTPUT 
