name: Deploy to SageMaker (Terraform)

on:
  workflow_run:
    workflows: ["Build & Push Docker Image to ECR"]
    types:
      - completed
  workflow_dispatch:

env:
  NAMESPACE: epp-sla-hourly-anomaly
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_DIR: aws/terraform
  COMPONENT: app

jobs:

  ##############################################
  # PLAN JOB (NO APPROVAL)
  ##############################################
  plan:
    runs-on: ubuntu-latest

    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}
      previous_image: ${{ steps.prev.outputs.previous_image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Extract Git Tag
        id: vars
        run: |
          TAG=${{ github.event.workflow_run.head_branch }}
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build Image URI
        id: image
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          IMAGE_URI=$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.NAMESPACE }}/${{ env.COMPONENT }}:${{ steps.vars.outputs.tag }}

          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Capture Previous Image
        id: prev
        working-directory: ${{ env.TF_DIR }}
        run: |
          PREV=$(terraform output -raw current_image || echo "none")
          echo "previous_image=$PREV" >> $GITHUB_OUTPUT

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan \
            -out=tfplan \
            -var="ecr_image=${{ steps.image.outputs.image_uri }}"

      - name: Upload tfplan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_DIR }}/tfplan


  ##############################################
  # APPLY JOB (WITH APPROVAL)
  ##############################################
  apply:
    runs-on: ubuntu-latest
    needs: plan

    # ✅ Approval happens HERE
    environment:
      name: Production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download tfplan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_DIR }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Health Check
        id: health
        continue-on-error: true
        run: |
          MAX_RETRIES=20
          SLEEP_SECONDS=15

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Health check attempt $i..."

            if curl -f -X POST "${{ secrets.API_URL }}" \
              -H "x-api-key: ${{ secrets.API_KEY }}" \
              -H "Content-Type: application/json" \
              -d '{"model_name":"test","data":{}}'; then

              echo "✅ Endpoint is healthy"
              exit 0
            fi

            echo "❌ Not ready yet, retrying in $SLEEP_SECONDS seconds..."
            sleep $SLEEP_SECONDS
          done

          echo "🚨 Endpoint failed health check after retries"
          exit 1
      
      - name: Rollback
        if: steps.health.outcome == 'failure'
        working-directory: ${{ env.TF_DIR }}
        run: |
          PREV="${{ needs.plan.outputs.previous_image }}"
          if [ "$PREV" = "none" ]; then
            echo "No previous image found"
            exit 1
          fi

          terraform apply -auto-approve \
            -var="ecr_image=$PREV"